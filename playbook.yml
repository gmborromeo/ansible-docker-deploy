---
- name: Deploy Docker App with Ansible
  hosts: all
  become: true
  vars_files:
    - vars/main.yml
    - vars/secrets.yml

  roles:
    - docker
    - app
    - nodejs
    - nginx

  post_tasks:
    - name: Deployment Summary
      debug:
        msg:
          - "==============================="
          - "All apps deployed successfully!"
          - "==============================="
          - "Flask   → {{ flask_status }}"
          - "Node.js → {{ nodejs_status }}"
          - "Nginx   → {{ nginx_status }}"
          - "==============================="