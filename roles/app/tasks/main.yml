---
- name: Deploy Flask app
  block:
  - name: Create app directory
    file:
      path: "{{ app_dir }}"
      state: directory
      mode: '0755'

  - name: Copy all files
    copy:
      src: app.py
      dest: "{{ app_dir }}/app.py"
      mode: '0644'

  - name: Copy Dockerfile
    copy:
      src: Dockerfile
      dest: "{{ app_dir }}/Dockerfile"
      mode: '0644'

  - name: Build Dockerfile image
    community.docker.docker_image:
      name: "{{ app_name }}"
      build:
        path: "{{ app_dir }}"
      source: build
      state: present

  - name: Run the app container
    community.docker.docker_container:
      name: "{{ container_name }}"
      image: "{{ app_name }}"
      state: started
      restart_policy: always
      ports:
        - "{{ app_port }}:{{ app_port }}"
      networks:
          - name: appnetwork

  - name: Wait for Flask to be ready
    wait_for:
      host: localhost
      port: "{{ app_port }}"
      delay: 3
      timeout: 30
      msg: "Flask app did not start on port {{ app_port }}"
  
  - name: Check flask app is responding
    uri:
      url: "http://localhost:{{ app_port }}"
      method: GET
      status_code: 200
    register: flask_health
    retries: 3
    delay: 3

  - name: Flask health check result
    debug:
      msg: "Flask is up - responded with HTTP {{ flask_health.status }}"
  
  - name: Set Flask status success
    set_fact:
      flask_status: "UP - http://localhost:5000"

  rescue:
    - name: Flask deployment failed
      debug:
        msg: >
          Flask app deployment failed!
          Check the Dockerfile and app.py in {{ app_dir }}.

    - name: Set Flask status failed
      set_fact:
        flask_status: "FAILED"

  always:
    - name: Flask deploy status
      debug:
        msg: "Flask role finished - status: {{ flask_status }}"    